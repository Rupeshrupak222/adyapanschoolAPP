services:
  - type: web
    name: adyapanschool-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: node server.js
    envVars:
      # ─── TiDB Cloud (Primary Database) ───────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_SSL
        value: "true"

      # ─── JWT ──────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "7d"
      - key: JWT_REFRESH_EXPIRES_IN
        value: "30d"

      # ─── Server ───────────────────────────────────────────────────
      - key: CORS_ORIGINS
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"

      # ─── AWS S3 (File Storage — videos, notices, homework) ────────
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: "ap-south-1"
      - key: AWS_S3_BUCKET_NAME
        sync: false

      # ─── AWS RDS MySQL (Secondary / Backup Database) ──────────────
      - key: AWS_RDS_HOST
        sync: false
      - key: AWS_RDS_PORT
        value: "3306"
      - key: AWS_RDS_USER
        sync: false
      - key: AWS_RDS_PASSWORD
        sync: false
      - key: AWS_RDS_DATABASE
        value: "preschool"
      - key: AWS_RDS_SSL
        value: "true"

      # ─── SMS Gateway ──────────────────────────────────────────────
      - key: FAST2SMS_API_KEY
        sync: false
